<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PaichaN+ | Elite Commerce</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;900&display=swap" rel="stylesheet">
    
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        body { font-family: 'Outfit', sans-serif; background: #000814; color: #fff; margin:0; overflow-x: hidden; }
        .gold-grad { background: linear-gradient(135deg, #c5a059 0%, #f1d38e 50%, #c5a059 100%); color: #000; }
        .luxury-card { background: rgba(255, 255, 255, 0.02); backdrop-filter: blur(20px); border: 1px solid rgba(197, 160, 89, 0.15); border-radius: 1.2rem; }
        .input-luxury { background: rgba(255,255,255,0.03); border: 1px solid rgba(197, 160, 89, 0.2); padding: 12px; border-radius: 10px; outline: none; width: 100%; color: white; font-size: 12px; transition: 0.3s; }
        .input-luxury:focus { border-color: #f1d38e; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .verified-badge { background: #1d9bf0; color: white; border-radius: 50%; padding: 2px; font-size: 8px; margin-left: 4px; }
        .btn-action { padding: 12px; border-radius: 12px; font-weight: 900; text-transform: uppercase; font-size: 10px; transition: 0.3s; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, addDoc, getDocs, query, where, doc, updateDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        import { getAuth } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        // --- APNAR FIREBASE CONFIG (ACTIVE) ---
        const firebaseConfig = {
            apiKey: "AIzaSyC8xyH5J923wDob7R4icRpAp3SCbeaXx70",
            authDomain: "earncash-2b12f.firebaseapp.com",
            projectId: "earncash-2b12f",
            storageBucket: "earncash-2b12f.firebasestorage.app",
            messagingSenderId: "829794818209",
            appId: "1:829794818209:web:60df663d39c69eadf2f8e0"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);
        window.FB = { db, auth, collection, addDoc, getDocs, query, where, doc, updateDoc, onSnapshot };
    </script>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const App = () => {
            const [view, setView] = useState('login');
            const [userType, setUserType] = useState(null);
            const [wallet, setWallet] = useState(0);
            const [coins, setCoins] = useState(0);
            const [selectedProd, setSelectedProd] = useState(null);

            // Logic for 7-day Return Lock
            const canReturn = (orderDate) => {
                const diff = Math.ceil(Math.abs(new Date() - new Date(orderDate)) / (1000 * 60 * 60 * 24));
                return diff <= 7;
            };

            return (
                <div className="max-w-md mx-auto min-h-screen bg-[#000814] flex flex-col relative shadow-2xl shadow-black">
                    
                    {/* --- LOGIN SCREEN --- */}
                    {view === 'login' && (
                        <div className="p-8 flex-1 flex flex-col justify-center space-y-8">
                            <div className="text-center">
                                <h1 className="text-6xl font-black italic tracking-tighter">PAICHAN<span className="text-[#c5a059]">+</span></h1>
                                <p className="text-[10px] tracking-[4px] uppercase opacity-40 mt-2">Luxury Verified Ecosystem</p>
                            </div>
                            <div className="luxury-card p-8 space-y-4">
                                <input className="input-luxury" placeholder="IDENTIFICATION GMAIL" />
                                <input className="input-luxury" placeholder="ACCESS KEY" type="password" />
                                <button onClick={() => setView('customer_home')} className="w-full gold-grad btn-action shadow-lg">Enter Marketplace</button>
                                <div className="flex gap-2">
                                    <button onClick={() => setView('seller_panel')} className="flex-1 bg-white/5 border border-white/10 btn-action text-[8px]">Seller Studio</button>
                                    <button onClick={() => setView('admin_panel')} className="flex-1 bg-white/5 border border-white/10 btn-action text-[8px]">Admin Master</button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* --- CUSTOMER VIEW (WALLET, SEARCH, RAZORPAY) --- */}
                    {view === 'customer_home' && (
                        <div className="p-5 space-y-6 pb-24 overflow-y-auto no-scrollbar">
                            <div className="flex justify-between items-center">
                                <h2 className="text-2xl font-black italic">PAICHAN<span className="text-[#c5a059]">+</span></h2>
                                <div className="flex gap-2">
                                    <div className="bg-white/5 px-3 py-1 rounded-full flex items-center gap-1">
                                        <span className="text-[10px] font-black text-[#c5a059]">🪙 {coins}</span>
                                    </div>
                                    <button onClick={() => setView('account')} className="text-lg">👤</button>
                                </div>
                            </div>

                            {/* Wallet & Refer */}
                            <div className="grid grid-cols-2 gap-3">
                                <div className="luxury-card p-4 text-center">
                                    <p className="text-[8px] opacity-40 uppercase font-bold">Wallet Balance</p>
                                    <p className="text-xl font-black italic">₹{wallet}</p>
                                </div>
                                <div className="luxury-card p-4 text-center border-[#c5a059]/30">
                                    <p className="text-[8px] opacity-40 uppercase font-bold">Refer & Earn</p>
                                    <p className="text-[10px] font-black text-[#c5a059]">GET ₹50 PER REFER</p>
                                </div>
                            </div>

                            {/* Voice Search Logic */}
                            <div className="relative">
                                <input className="input-luxury pl-10 pr-10" placeholder="Search products..." />
                                <span className="absolute left-3 top-3.5 text-xs opacity-40">🔍</span>
                                <span className="absolute right-3 top-3.5 text-xs cursor-pointer hover:text-[#c5a059]">🎙️</span>
                            </div>

                            {/* Product List */}
                            <div className="grid grid-cols-2 gap-4">
                                <div onClick={() => { setSelectedProd({name: "Silk Festive Panjabi", brand: "PaichaN Elite", price: 2800, mrp: 5500, desc: "Luxury silk with handcrafted work. Verified Quality.", stock: 5}); setView('details'); }} className="luxury-card p-3 space-y-2 cursor-pointer transition active:scale-95">
                                    <div className="w-full h-36 bg-white/5 rounded-lg flex items-center justify-center opacity-10 font-bold uppercase text-[10px]">Product Image</div>
                                    <div className="flex items-center">
                                        <h4 className="text-[10px] font-black uppercase truncate">Silk Festive Panjabi</h4>
                                        <span className="verified-badge">✓</span>
                                    </div>
                                    <p className="text-xs font-black text-[#c5a059]">₹2,800</p>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* --- PRODUCT DETAILS (5 PHOTOS SLIDER) --- */}
                    {view === 'details' && selectedProd && (
                        <div className="flex-1 flex flex-col overflow-y-auto no-scrollbar pb-10">
                            <button onClick={() => setView('customer_home')} className="absolute top-5 left-5 z-50 bg-black/60 p-2 rounded-full">←</button>
                            <div className="w-full h-[420px] bg-white/5 flex items-center justify-center opacity-30 text-xs font-black tracking-[10px] uppercase">
                                Image Slider (1-5)
                            </div>
                            <div className="p-8 space-y-5 bg-[#000814] rounded-t-[2.5rem] -mt-12 relative z-10 shadow-2xl border-t border-white/5">
                                <div>
                                    <div className="flex items-center gap-1">
                                        <p className="text-[10px] font-black text-[#c5a059] uppercase">{selectedProd.brand}</p>
                                        <span className="verified-badge">✓</span>
                                    </div>
                                    <h2 className="text-2xl font-black italic uppercase">{selectedProd.name}</h2>
                                </div>
                                <div className="flex items-center gap-4">
                                    <span className="text-3xl font-black italic">₹{selectedProd.price}</span>
                                    <span className="text-xs line-through opacity-30">₹{selectedProd.mrp}</span>
                                    <span className="bg-red-500/20 text-red-500 text-[9px] font-black px-2 py-1 rounded">-{Math.round(((selectedProd.mrp-selectedProd.price)/selectedProd.mrp)*100)}%</span>
                                </div>
                                <p className="text-xs opacity-60 leading-relaxed font-medium">{selectedProd.desc}</p>
                                <div className="grid grid-cols-2 gap-4 pt-6">
                                    <button className="bg-white/5 border border-white/10 btn-action">Add to Cart</button>
                                    <button className="gold-grad btn-action shadow-lg shadow-[#c5a059]/20">Buy (Razorpay)</button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* --- SELLER STUDIO (REPORTS, INVOICE, STOCK ALERT) --- */}
                    {view === 'seller_panel' && (
                        <div className="p-6 space-y-6 overflow-y-auto no-scrollbar">
                            <div className="flex justify-between items-center">
                                <h2 className="text-xl font-black text-[#c5a059]">Seller Studio</h2>
                                <span className="verified-badge">✓ Verified</span>
                            </div>
                            <div className="luxury-card p-5 space-y-3">
                                <p className="text-[10px] font-bold opacity-40 uppercase">Performance & Invoices</p>
                                <div className="flex gap-2">
                                    <button className="flex-1 bg-white/5 border border-white/10 btn-action text-[8px]">Download PDF</button>
                                    <button className="flex-1 bg-white/5 border border-white/10 btn-action text-[8px]">Weekly Report</button>
                                </div>
                            </div>
                            <div className="luxury-card p-6 space-y-4">
                                <p className="text-[10px] font-bold opacity-40 uppercase">Add Product (5 Photos)</p>
                                <input className="input-luxury" placeholder="Primary Image Link" />
                                <div className="grid grid-cols-2 gap-2">
                                    <input className="input-luxury" placeholder="Photo 2" /><input className="input-luxury" placeholder="Photo 3" />
                                    <input className="input-luxury" placeholder="Photo 4" /><input className="input-luxury" placeholder="Photo 5" />
                                </div>
                                <input className="input-luxury" placeholder="Product Name / Description" />
                                <div className="grid grid-cols-2 gap-2">
                                    <input className="input-luxury" placeholder="Size (S,M,L,XL)" />
                                    <input className="input-luxury" placeholder="Color" />
                                </div>
                                <div className="bg-red-500/10 border border-red-500/20 p-3 rounded-lg">
                                    <p className="text-[9px] font-black text-red-500 uppercase">🔥 Stock Alert: Only 2 items left!</p>
                                </div>
                                <button className="w-full gold-grad btn-action">Publish to Store</button>
                            </div>
                        </div>
                    )}

                    {/* --- ADMIN MASTER (BAN, FEE, APPROVAL) --- */}
                    {view === 'admin_panel' && (
                        <div className="p-6 space-y-6 overflow-y-auto no-scrollbar">
                            <h2 className="text-xl font-black text-[#c5a059]">Admin Master</h2>
                            <div className="luxury-card p-5 space-y-4">
                                <p className="text-[10px] font-bold opacity-40 uppercase">Live User Tracking</p>
                                <div className="flex justify-between items-center p-3 bg-white/5 rounded-lg border border-white/5">
                                    <span className="text-[11px] font-bold">User: @tanvir_77</span>
                                    <button className="bg-red-600 text-white text-[8px] font-black px-3 py-1.5 rounded uppercase">Ban User</button>
                                </div>
                            </div>
                            <div className="grid grid-cols-2 gap-3">
                                <div className="luxury-card p-4">
                                    <p className="text-[9px] opacity-40 uppercase font-bold">Platform Fee</p>
                                    <p className="text-xl font-black italic">5.2%</p>
                                    <button className="text-[8px] text-[#c5a059] font-black uppercase mt-2 underline">Edit Fee</button>
                                </div>
                                <div className="luxury-card p-4">
                                    <p className="text-[9px] opacity-40 uppercase font-bold">Approvals</p>
                                    <p className="text-xl font-black italic">08 Pending</p>
                                </div>
                            </div>
                            <div className="luxury-card p-5 space-y-3">
                                <p className="text-[10px] font-bold opacity-40 uppercase">Global Pop-up Notice</p>
                                <textarea className="input-luxury h-16 text-[10px]" placeholder="Set alert for all users..."></textarea>
                                <button className="w-full bg-[#c5a059]/10 border border-[#c5a059] text-[#c5a059] btn-action">Push Notification</button>
                            </div>
                        </div>
                    )}

                    {/* --- ACCOUNT & POLICIES (7-DAY LOCK) --- */}
                    {view === 'account' && (
                        <div className="p-6 space-y-4">
                            <h2 className="text-xl font-black italic">Profile & Policies</h2>
                            <div className="luxury-card p-4 space-y-4">
                                <div className="flex justify-between items-center border-b border-white/5 pb-3">
                                    <p className="text-xs font-bold uppercase italic">#PNC-9042 (Delivered)</p>
                                    <span className="text-[9px] text-green-400 font-black uppercase">Completed</span>
                                </div>
                                <div className="flex gap-2">
                                    <button className="flex-1 bg-white/5 border border-white/10 btn-action text-[8px]">Download Invoice</button>
                                    <button disabled className="flex-1 bg-white/5 opacity-20 btn-action text-[8px] italic">Return Locked</button>
                                </div>
                            </div>
                            <div className="luxury-card divide-y divide-white/5">
                                <button className="w-full p-4 text-left text-[10px] font-bold uppercase">Refund Policy</button>
                                <button className="w-full p-4 text-left text-[10px] font-bold uppercase">Terms & Conditions</button>
                            </div>
                            <button onClick={() => setView('login')} className="w-full bg-red-500/10 border border-red-500/20 text-red-500 btn-action mt-10">Logout Ecosystem</button>
                        </div>
                    )}

                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
