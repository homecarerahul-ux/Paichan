<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PaichaN+ | Elite Marketplace</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;900&display=swap" rel="stylesheet">
    
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        body { font-family: 'Outfit', sans-serif; background: #000814; color: #fff; margin:0; overflow-x: hidden; }
        .gold-grad { background: linear-gradient(135deg, #c5a059 0%, #f1d38e 50%, #c5a059 100%); color: #000; }
        .luxury-card { background: rgba(255, 255, 255, 0.02); backdrop-filter: blur(20px); border: 1px solid rgba(197, 160, 89, 0.15); border-radius: 1.5rem; }
        .input-luxury { background: rgba(255,255,255,0.03); border: 1px solid rgba(197, 160, 89, 0.2); padding: 14px; border-radius: 12px; outline: none; width: 100%; color: white; font-size: 13px; transition: 0.3s; }
        .input-luxury:focus { border-color: #f1d38e; background: rgba(255,255,255,0.05); }
        .btn-main { padding: 14px; border-radius: 14px; font-weight: 900; text-transform: uppercase; font-size: 11px; letter-spacing: 1px; transition: 0.3s; width: 100%; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .verified-badge { background: #1d9bf0; color: white; border-radius: 50%; padding: 2px; font-size: 8px; margin-left: 4px; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, onAuthStateChanged, signInWithEmailAndPassword, createUserWithEmailAndPassword, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc, updateDoc, increment } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyC8xyH5J923wDob7R4icRpAp3SCbeaXx70",
            authDomain: "earncash-2b12f.firebaseapp.com",
            projectId: "earncash-2b12f",
            storageBucket: "earncash-2b12f.firebasestorage.app",
            messagingSenderId: "829794818209",
            appId: "1:829794818209:web:60df663d39c69eadf2f8e0"
        };

        const app = initializeApp(firebaseConfig);
        window.auth = getAuth(app);
        window.db = getFirestore(app);
        window.api = { signInWithEmailAndPassword, createUserWithEmailAndPassword, signOut, onAuthStateChanged, doc, setDoc, getDoc, updateDoc, increment };
    </script>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const App = () => {
            const [view, setView] = useState('loading');
            const [mode, setMode] = useState('login');
            const [form, setForm] = useState({ email: '', pass: '', ref: '' });
            const [user, setUser] = useState(null);
            const [loading, setLoading] = useState(false);

            // Session & Auto-Role Logic
            useEffect(() => {
                const unsubscribe = window.api.onAuthStateChanged(window.auth, async (currUser) => {
                    if (currUser) {
                        const snap = await window.api.getDoc(window.api.doc(window.db, "users", currUser.uid));
                        if(snap.exists()) {
                            const data = snap.data();
                            setUser({ ...data, uid: currUser.uid });
                            if(data.role === 'admin') setView('admin_panel');
                            else if(data.role === 'seller') setView('seller_panel');
                            else setView('customer_home');
                        }
                    } else {
                        setView('login');
                    }
                });
                return () => unsubscribe();
            }, []);

            const handleAuth = async () => {
                if(!form.email || !form.pass) return alert("Fields cannot be empty!");
                setLoading(true);
                try {
                    if(mode === 'signup') {
                        const res = await window.api.createUserWithEmailAndPassword(window.auth, form.email, form.pass);
                        const newUser = { 
                            email: form.email, 
                            role: 'customer', 
                            wallet: 0, 
                            coins: 10, 
                            refBy: form.ref || null, 
                            uid: res.user.uid,
                            address: "" 
                        };
                        await window.api.setDoc(window.api.doc(window.db, "users", res.user.uid), newUser);
                        alert("Account Created! You got 10 P-Coins.");
                    } else {
                        await window.api.signInWithEmailAndPassword(window.auth, form.email, form.pass);
                    }
                } catch (err) { alert(err.message); }
                setLoading(false);
            };

            const logout = () => window.api.signOut(window.auth);

            if(view === 'loading') return (
                <div className="h-screen flex flex-col items-center justify-center bg-[#000814] space-y-4">
                    <h1 className="text-4xl font-black italic text-[#c5a059] animate-pulse">PAICHAN+</h1>
                    <div className="w-12 h-1 border-t-2 border-[#c5a059] animate-spin rounded-full"></div>
                </div>
            );

            return (
                <div className="max-w-md mx-auto min-h-screen bg-[#000814] flex flex-col no-scrollbar">
                    
                    {/* AUTH VIEW */}
                    {(view === 'login' || view === 'signup') && (
                        <div className="p-8 flex-1 flex flex-col justify-center space-y-8">
                            <div className="text-center">
                                <h1 className="text-6xl font-black italic tracking-tighter">PAICHAN<span className="text-[#c5a059]">+</span></h1>
                                <p className="text-[10px] tracking-[5px] opacity-40 uppercase mt-2">Elite Marketplace</p>
                            </div>
                            <div className="luxury-card p-8 space-y-4 shadow-2xl">
                                <input className="input-luxury" placeholder="GMAIL ID" onChange={(e)=>setForm({...form, email: e.target.value})} />
                                <input className="input-luxury" placeholder="PASSWORD" type="password" onChange={(e)=>setForm({...form, pass: e.target.value})} />
                                {mode === 'signup' && <input className="input-luxury border-dashed border-[#c5a059]/40" placeholder="REFERRAL CODE (OPTIONAL)" onChange={(e)=>setForm({...form, ref: e.target.value})} />}
                                
                                <button onClick={handleAuth} className="gold-grad btn-main shadow-lg">
                                    {loading ? 'Processing...' : (mode === 'login' ? 'Enter Marketplace' : 'Create Account')}
                                </button>
                                <button onClick={()=>setMode(mode === 'login' ? 'signup' : 'login')} className="w-full text-[10px] font-black opacity-40 uppercase">
                                    {mode === 'login' ? "New Customer? Register" : "Already a member? Login"}
                                </button>
                            </div>
                            <button className="w-full bg-[#c5a059]/5 border border-[#c5a059]/20 p-5 rounded-2xl text-[11px] font-black text-[#c5a059] uppercase tracking-[3px]">
                                👑 Become a PaichaN Seller
                            </button>
                        </div>
                    )}

                    {/* CUSTOMER HOME */}
                    {view === 'customer_home' && (
                        <div className="p-6 space-y-6 animate-in">
                            <div className="flex justify-between items-center">
                                <h2 className="text-2xl font-black italic">PAICHAN<span className="text-[#c5a059]">+</span></h2>
                                <button onClick={logout} className="text-red-500 font-black text-[10px] uppercase">Logout</button>
                            </div>
                            <div className="grid grid-cols-2 gap-3">
                                <div className="luxury-card p-4 text-center">
                                    <p className="text-[8px] opacity-40 uppercase font-bold">Wallet</p>
                                    <p className="text-xl font-black italic">₹{user?.wallet}</p>
                                </div>
                                <div className="luxury-card p-4 text-center">
                                    <p className="text-[8px] opacity-40 uppercase font-bold">P-Coins</p>
                                    <p className="text-xl font-black italic text-[#c5a059]">🪙 {user?.coins}</p>
                                </div>
                            </div>
                            {/* Refer & Earn */}
                            <div className="luxury-card p-6 space-y-4 border-[#c5a059]/30 bg-gradient-to-br from-[#c5a059]/10 to-transparent">
                                <h3 className="text-xs font-black italic uppercase">Referral Rewards</h3>
                                <div className="flex gap-2">
                                    <input readOnly className="input-luxury text-[10px] flex-1 bg-black/40" value={`REF-${user?.uid?.substring(0,6)}`} />
                                    <button onClick={() => {alert("Link Copied!")}} className="gold-grad px-4 rounded-xl font-black text-[10px]">COPY</button>
                                </div>
                                <p className="text-[8px] opacity-40">Get ₹50 for every friend who joins & shops.</p>
                            </div>
                            <div className="flex gap-2">
                                <button onClick={()=>setView('seller_panel')} className="flex-1 bg-white/5 border border-white/10 btn-main text-[8px] opacity-60">Seller Mode</button>
                                <button onClick={()=>setView('admin_panel')} className="flex-1 bg-white/5 border border-white/10 btn-main text-[8px] opacity-60">Admin Mode</button>
                            </div>
                        </div>
                    )}

                    {/* SELLER STUDIO */}
                    {view === 'seller_panel' && (
                        <div className="p-6 space-y-6 animate-in">
                            <div className="flex justify-between items-center">
                                <h2 className="text-xl font-black text-[#c5a059]">Seller Studio <span className="verified-badge">✓</span></h2>
                                <button onClick={logout} className="text-[10px] font-bold opacity-40">LOGOUT</button>
                            </div>
                            <div className="luxury-card p-5 space-y-4">
                                <p className="text-[10px] font-bold opacity-40 uppercase">Delivery & Invoicing</p>
                                <div className="p-4 bg-white/5 border border-white/10 rounded-xl space-y-2">
                                    <div className="flex justify-between">
                                        <span className="text-[10px] font-black">INV-9902</span>
                                        <span className="text-[8px] font-bold text-green-400 uppercase">Paid</span>
                                    </div>
                                    <p className="text-[9px] opacity-60">Customer: Rahul UX</p>
                                    <p className="text-[9px] opacity-60 italic">Seller Address: <span className="text-[#c5a059]">{user?.address || "PaichaN Central Hub (Default)"}</span></p>
                                    <button className="w-full gold-grad py-2 rounded-lg font-black text-[9px] uppercase mt-2">Download Invoice</button>
                                </div>
                            </div>
                            <div className="luxury-card p-6 space-y-4">
                                <p className="text-[10px] font-bold opacity-40 uppercase text-center">Add Product (5 Photo Slots)</p>
                                <div className="grid grid-cols-5 gap-1">
                                    {[1,2,3,4,5].map(i => <div key={i} className="h-10 bg-white/5 border border-white/10 rounded-lg flex items-center justify-center text-[8px] opacity-20">PH {i}</div>)}
                                </div>
                                <input className="input-luxury" placeholder="Product Title" />
                                <div className="grid grid-cols-2 gap-2">
                                    <input className="input-luxury" placeholder="Price (₹)" />
                                    <input className="input-luxury" placeholder="Stock" />
                                </div>
                                <button className="gold-grad btn-main">Publish to Store</button>
                            </div>
                            <button onClick={()=>setView('customer_home')} className="w-full text-[10px] font-black opacity-30 uppercase">Back to Customer Home</button>
                        </div>
                    )}

                    {/* ADMIN MASTER */}
                    {view === 'admin_panel' && (
                        <div className="p-6 space-y-6">
                            <div className="flex justify-between items-center">
                                <h2 className="text-xl font-black text-[#c5a059]">Admin Master</h2>
                                <button onClick={()=>setView('customer_home')} className="text-[10px] font-bold opacity-40">BACK</button>
                            </div>
                            <div className="luxury-card p-8 text-center space-y-2">
                                <p className="text-[10px] opacity-40 uppercase">Global Revenue</p>
                                <p className="text-4xl font-black italic text-green-400 font-mono">₹4,85,200</p>
                                <div className="pt-4 grid grid-cols-2 gap-2">
                                    <div className="bg-white/5 p-3 rounded-xl"><p className="text-lg font-black">1.2k</p><p className="text-[8px] opacity-40 uppercase">Users</p></div>
                                    <div className="bg-white/5 p-3 rounded-xl"><p className="text-lg font-black">84</p><p className="text-[8px] opacity-40 uppercase">Sellers</p></div>
                                </div>
                            </div>
                        </div>
                    )}

                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
